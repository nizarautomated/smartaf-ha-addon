name: SmartAF Node-RED Deploy Agent
version: "0.4.1"
slug: smartaf_nodered_deploy
description: Applies validated Node-RED patches and runs bounded read-only Home Assistant diagnostics through GitHub.
url: https://github.com/nizarautomated/smartaf-ha-addon
startup: services
boot: auto
init: false
arch:
  - aarch64
  - amd64
  - armv7
hassio_api: true
hassio_role: manager
homeassistant_api: true
map:
  - type: all_addon_configs
    read_only: false
options:
  github_repository: nizarautomated/home-assistant-node-red
  github_branch: main
  github_token: ""
  deployment_path: deployments/pending.json
  status_directory: deployments/status
  nodered_addon_slug: a0d7b954_nodered
  flows_path: /addon_configs/a0d7b954_nodered/flows.json
  poll_interval_seconds: 60
  restart_timeout_seconds: 120
  dry_run: false
  app_repository: nizarautomated/smartaf-ha-addon
  app_branch: main
  app_config_path: smartaf_deploy_agent/config.yaml
  app_update_check_interval_seconds: 300
  diagnostic_request_path: diagnostics/request.json
  diagnostic_report_directory: diagnostics/reports
  diagnostic_max_entities: 10
  diagnostic_max_duration_seconds: 120
schema:
  github_repository: str
  github_branch: str
  github_token: password
  deployment_path: str
  status_directory: str
  nodered_addon_slug: str
  flows_path: str
  poll_interval_seconds: int(15,3600)
  restart_timeout_seconds: int(30,600)
  dry_run: bool
  app_repository: str
  app_branch: str
  app_config_path: str
  app_update_check_interval_seconds: int(60,3600)
  diagnostic_request_path: str
  diagnostic_report_directory: str
  diagnostic_max_entities: int(1,10)
  diagnostic_max_duration_seconds: int(10,120)
